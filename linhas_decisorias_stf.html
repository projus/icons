<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Oscilação Jurisprudencial · ICONS · STF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --ink:#0f0e0d;--paper:#f5f0e8;--paper2:#ede7d9;--paper3:#e2d9c8;
  --gold:#b8860b;--gold2:#d4a017;--navy:#1a2744;--navy2:#243058;
  --muted:#6b6355;--muted2:#9b9186;
  --border:rgba(15,14,13,.1);--border2:rgba(15,14,13,.2);
  --red:#c0392b;--red2:#e74c3c;--red3:#fdf0ef;
  --amber:#b8860b;--amber2:#f39c12;--amber3:#fdf3d7;
  --blue:#1a2744;--blue2:#3d679c;--blue3:#e8ecf4;
  --green:#0d5c5c;--green2:#1a9e9e;--green3:#e1f5ee;
  --ff-d:"Playfair Display",serif;--ff-m:"DM Mono",monospace;--ff-b:"DM Sans",sans-serif;
  --sh:0 1px 12px rgba(15,14,13,.07);--sh2:0 4px 32px rgba(15,14,13,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:var(--ff-b);background:var(--paper3);color:var(--ink);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* HEADER */
.hdr{background:var(--navy);flex-shrink:0;box-shadow:0 2px 16px rgba(0,0,0,.3);z-index:100}
.hdr-i{padding:0 1.5rem;display:flex;align-items:center;height:52px;gap:1.25rem}
.logo{font-family:var(--ff-d);font-size:14px;font-weight:700;color:var(--gold2);white-space:nowrap;flex-shrink:0}
.logo span{color:rgba(245,240,232,.45);font-weight:400}
.back{font-family:var(--ff-m);font-size:9px;color:rgba(245,240,232,.45);text-decoration:none;border:.5px solid rgba(245,240,232,.15);padding:3px 9px;border-radius:3px;transition:all .15s}
.back:hover{background:rgba(255,255,255,.08);color:#f5f0e8}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:1rem}
.hdr-badge{font-family:var(--ff-m);font-size:9px;color:rgba(245,240,232,.25);letter-spacing:.1em}
.kbd-hint{font-family:var(--ff-m);font-size:8px;color:rgba(245,240,232,.3);display:flex;align-items:center;gap:4px}
.k{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:3px;padding:1px 5px;font-size:8px}

/* WORKSPACE */
.workspace{flex:1;display:grid;grid-template-columns:300px 1fr;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{background:var(--paper2);border-right:1px solid var(--border2);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:.8rem 1rem .65rem;border-bottom:1px solid var(--border2);background:var(--paper);flex-shrink:0}

/* search */
.srch-wrap{position:relative;margin-bottom:.5rem}
.srch-wrap input{width:100%;padding:7px 28px 7px 30px;font-family:var(--ff-m);font-size:10px;border:1.5px solid var(--border2);border-radius:5px;background:var(--paper);color:var(--ink);outline:none;transition:border-color .15s}
.srch-wrap input:focus{border-color:var(--navy)}
.srch-wrap .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted2);pointer-events:none}
.srch-wrap .sx{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted2);font-size:16px;line-height:1;display:none}
.srch-wrap .sx.on{display:block}

/* sort */
.sort-row{display:flex;gap:3px;margin-bottom:.4rem}
.sbt{font-family:var(--ff-m);font-size:9px;padding:4px 8px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:4px;cursor:pointer;flex:1;text-align:center;transition:all .12s}
.sbt.active{background:var(--navy);color:var(--gold2);border-color:var(--navy)}
.sbt:hover:not(.active){background:var(--paper3)}
.cnt{font-family:var(--ff-m);font-size:8px;color:var(--muted2);text-align:right;letter-spacing:.05em}

/* article list */
.art-list{overflow-y:auto;flex:1;padding:.2rem 0}
.art-item{padding:.6rem 1rem;cursor:pointer;border-left:3px solid transparent;border-bottom:1px solid var(--border);transition:background .1s,border-color .1s}
.art-item:hover{background:rgba(255,255,255,.65)}
.art-item.active{background:var(--paper);border-left-color:var(--navy)}

.ai-row1{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.ai-num{font-family:var(--ff-m);font-size:10px;font-weight:500;color:var(--navy)}
.ai-tier{font-family:var(--ff-m);font-size:8px;padding:1px 6px;border-radius:3px;margin-left:auto;white-space:nowrap}
.ai-tier.critical{background:var(--red3);color:var(--red);border:1px solid #e74c3c44}
.ai-tier.high{background:var(--amber3);color:var(--amber);border:1px solid #f39c1244}
.ai-tier.moderate{background:var(--blue3);color:var(--blue2);border:1px solid #3d679c44}
.ai-tier.stable{background:var(--green3);color:var(--green);border:1px solid #1a9e9e44}

.ai-label{font-size:10px;color:var(--muted);line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:4px}

.ai-row3{display:flex;align-items:center;gap:0}
/* oscillation sparkline — key visual */
.oscillo{display:flex;gap:0;align-items:flex-end;height:20px;flex:1}
.obar{flex:1;min-width:3px;border-radius:1px 1px 0 0;position:relative;transition:opacity .1s}
.obar.brk::after{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--red2);border:1.5px solid var(--paper)}
.ai-score{font-family:var(--ff-m);font-size:10px;font-weight:500;min-width:28px;text-align:right;padding-left:6px}
.ai-score.critical{color:var(--red)}
.ai-score.high{color:var(--amber)}
.ai-score.moderate{color:var(--blue2)}
.ai-score.stable{color:var(--green)}

/* ── DETAIL ── */
.detail{overflow-y:auto;background:var(--paper);display:flex;flex-direction:column}
.detail-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted2);gap:.75rem;padding:2rem}
.detail-empty .icon{font-size:32px;opacity:.2}
.detail-empty p{font-family:var(--ff-m);font-size:11px;letter-spacing:.08em;text-align:center}
.detail-empty .hint{display:flex;gap:6px;align-items:center;font-family:var(--ff-m);font-size:9px;opacity:.6}
.k2{background:var(--paper2);border:1px solid var(--border2);border-radius:3px;padding:1px 6px;font-size:9px;font-family:var(--ff-m)}

.d-wrap{padding:1.5rem 2rem 3rem;max-width:900px}

/* nav row */
.d-nav{display:flex;align-items:center;gap:6px;margin-bottom:1.25rem}
.nav-btn{font-family:var(--ff-m);font-size:9px;padding:4px 10px;border:1px solid var(--border2);background:var(--paper2);color:var(--muted);border-radius:4px;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:3px}
.nav-btn:hover:not(:disabled){background:var(--paper3);color:var(--ink)}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-pos{font-family:var(--ff-m);font-size:9px;color:var(--muted2);padding:0 6px}

/* article header */
.d-num{font-family:var(--ff-m);font-size:10px;color:var(--muted);letter-spacing:.08em;margin-bottom:.25rem}
.d-title{font-family:var(--ff-d);font-size:20px;font-weight:900;line-height:1.2;margin-bottom:.4rem}
.d-full{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border2)}

/* INSTABILITY DASHBOARD */
.inst-dash{display:grid;grid-template-columns:auto 1fr;gap:1.25rem;margin-bottom:1.75rem;background:#fff;border:1px solid var(--border);border-radius:8px;padding:1.25rem;box-shadow:var(--sh)}

.inst-score-block{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:110px;padding:.5rem 1rem;border-right:1px solid var(--border);gap:.25rem}
.inst-score-n{font-family:var(--ff-d);font-size:52px;font-weight:900;line-height:1}
.inst-score-n.critical{color:var(--red)}
.inst-score-n.high{color:var(--amber)}
.inst-score-n.moderate{color:var(--blue2)}
.inst-score-n.stable{color:var(--green)}
.inst-score-l{font-family:var(--ff-m);font-size:8px;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;text-align:center}
.inst-tier-badge{font-family:var(--ff-m);font-size:9px;padding:3px 10px;border-radius:10px;margin-top:4px;text-align:center}
.inst-tier-badge.critical{background:var(--red3);color:var(--red);border:1px solid #e74c3c55}
.inst-tier-badge.high{background:var(--amber3);color:var(--amber);border:1px solid #f39c1255}
.inst-tier-badge.moderate{background:var(--blue3);color:var(--blue2);border:1px solid #3d679c55}
.inst-tier-badge.stable{background:var(--green3);color:var(--green);border:1px solid #1a9e9e55}

.inst-dims{display:flex;flex-direction:column;gap:.6rem;justify-content:center}
.inst-dim{display:flex;align-items:center;gap:.6rem;font-size:11px}
.inst-dim-l{width:120px;flex-shrink:0;color:var(--muted);font-size:10px}
.inst-dim-bar{flex:1;height:6px;background:var(--paper3);border-radius:3px;overflow:hidden}
.inst-dim-fill{height:100%;border-radius:3px;transition:width .4s}
.inst-dim-v{width:30px;text-align:right;font-family:var(--ff-m);font-size:9px;color:var(--muted2);flex-shrink:0}

/* CHART ROW */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.cc{background:#fff;border:1px solid var(--border);border-radius:8px;padding:1rem;box-shadow:var(--sh)}
.cc-t{font-family:var(--ff-m);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:.6rem}
.cw{position:relative;height:140px}

/* ALERTS — reversals & fragmentation */
.alerts{margin-bottom:1.5rem;display:flex;flex-direction:column;gap:.6rem}
.alert-box{border-radius:6px;padding:.75rem 1rem;border:1px solid;font-size:11px;line-height:1.5}
.alert-box.reversal{background:#fdf0ef;border-color:#e74c3c44;color:var(--red)}
.alert-box.frag{background:#fdf3d7;border-color:#f39c1244;color:#7a5a07}
.alert-icon{font-size:13px;margin-right:4px}
.alert-title{font-family:var(--ff-m);font-size:9px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.alert-body{color:var(--ink);font-size:10px;line-height:1.5}

/* VERTICAL TIMELINE */
.sec-t{font-family:var(--ff-m);font-size:9px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;color:var(--muted2);margin-bottom:1rem;padding-bottom:.4rem;border-bottom:1px solid var(--border2)}
.vtl{position:relative;padding-left:32px;margin-bottom:2rem}
.vtl::before{content:'';position:absolute;left:10px;top:8px;bottom:8px;width:2px;background:linear-gradient(to bottom,var(--navy),rgba(26,39,68,.1))}

.vtl-node{position:relative;margin-bottom:4px}

/* break connector between nodes */
.brk-connector{margin:-2px 0 2px -6px;display:flex;align-items:center;gap:6px;padding:5px 0}
.brk-line{flex:1;height:1px;background:repeating-linear-gradient(to right,var(--red2) 0,var(--red2) 4px,transparent 4px,transparent 8px)}
.brk-badge{font-family:var(--ff-m);font-size:8px;padding:3px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0;border:1px solid}
.brk-badge.rel{background:var(--amber3);color:var(--amber);border-color:#d4a01766}
.brk-badge.cls{background:var(--blue3);color:var(--blue2);border-color:#3d679c55}
.brk-badge.rev{background:var(--red3);color:var(--red);border-color:#e74c3c55}

/* node dot */
.vtl-dot{position:absolute;left:-26px;top:20px;width:14px;height:14px;border-radius:50%;border:2.5px solid var(--paper);z-index:2;transition:transform .15s}
.vtl-dot.is-brk{width:18px;height:18px;left:-28px;top:17px;box-shadow:0 0 0 3px rgba(231,76,60,.18)}
.vtl-dot.is-rev{box-shadow:0 0 0 4px rgba(231,76,60,.3),0 0 0 7px rgba(231,76,60,.1)}

/* period card */
.period-card{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:var(--sh);transition:box-shadow .15s}
.period-card:hover{box-shadow:var(--sh2)}
.period-card.is-brk{border-color:rgba(231,76,60,.35);border-width:1.5px}
.period-card.is-frag{border-color:rgba(243,156,18,.35);border-width:1.5px}

/* card head */
.pc-head{display:flex;align-items:center;gap:0;background:var(--navy)}

.pc-period-col{padding:.65rem .85rem;border-right:1px solid rgba(255,255,255,.08)}
.pc-period{font-family:var(--ff-m);font-size:9px;color:rgba(245,240,232,.5);margin-bottom:2px}
.pc-count{font-family:var(--ff-d);font-size:24px;font-weight:900;color:var(--gold2);line-height:1}
.pc-count-l{font-family:var(--ff-m);font-size:8px;color:rgba(245,240,232,.3)}

.pc-rel-col{flex:1;padding:.65rem .85rem}
.pc-relator{font-size:12px;font-weight:500;color:#f5f0e8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-cls{font-family:var(--ff-m);font-size:9px;color:rgba(245,240,232,.4);margin-top:2px}

.pc-flags{padding:.65rem .85rem;display:flex;flex-direction:column;gap:3px;align-items:flex-end}

/* card body — doctrine */
.pc-body{padding:.8rem 1rem 1rem;border-top:1px solid var(--border)}
.pc-body-yr{font-family:var(--ff-m);font-size:9px;color:var(--muted2);margin-bottom:.35rem}
.pc-doctrine{font-size:11px;line-height:1.65;color:var(--ink);font-style:italic;border-left:3px solid var(--gold);padding-left:.75rem}

/* BEFORE / AFTER change panel */
.change-panel{margin-top:.75rem;border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.cp-row{padding:.6rem .85rem}
.cp-row.before{background:var(--paper3);border-bottom:1px solid var(--border)}
.cp-row.after{background:rgba(184,134,11,.04);border-top:2px solid var(--gold)}
.cp-label{font-family:var(--ff-m);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:.3rem;display:flex;align-items:center;gap:5px}
.cp-text{font-size:11px;line-height:1.6;color:var(--muted);font-style:italic}
.cp-text.new{color:var(--ink)}
.cp-divider{text-align:center;padding:.3rem;font-family:var(--ff-m);font-size:9px;color:var(--red);background:var(--red3);border-top:1px solid #e74c3c22;border-bottom:1px solid #e74c3c22;letter-spacing:.05em}

/* frag warning inside card */
.frag-warn{font-family:var(--ff-m);font-size:8px;padding:3px 7px;border-radius:3px;background:var(--amber3);color:var(--amber);border:1px solid #d4a01744;white-space:nowrap}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>

const RC={};const PAL=['#1a2744','#c0392b','#0d5c5c','#7a5a07','#4a3080','#2d6a2d','#5c3a1a','#1a5c3a','#3a1a5c','#c0700b','#5c4a1a','#243058','#6b2d1a','#1a4a3a','#4a1a3a'];
let pi=0;
function rc(n){if(!n)return'#9b9186';if(!RC[n])RC[n]=PAL[pi++%PAL.length];return RC[n];}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

const TC={critical:'crítica',high:'alta',moderate:'moderada',stable:'estável'};
const TL={critical:'Instabilidade crítica',high:'Instabilidade alta',moderate:'Instabilidade moderada',stable:'Linha estável'};

let sort='score',srch='',actId=null;
const chts={};
function kc(id){if(chts[id]){chts[id].destroy();delete chts[id];}}

function gf(){
  let d=[...A];
  if(srch){const s=srch.toLowerCase();d=d.filter(a=>a.id.toLowerCase().includes(s)||a.full.toLowerCase().includes(s));}
  if(sort==='score')d.sort((a,b)=>b.score-a.score);
  if(sort==='total')d.sort((a,b)=>b.total-a.total);
  if(sort==='span')d.sort((a,b)=>b.span-a.span);
  return d;
}

function aidx(){return gf().findIndex(a=>a.id===actId);}

function rSide(){
  const d=gf();
  document.getElementById('cnt').textContent=d.length+' artigo'+(d.length!==1?'s':'');
  document.getElementById('al').innerHTML=d.map((art,i)=>{
    const mx=Math.max(...art.line.map(w=>w.count),1);
    const bars=art.line.map(w=>{
      const h=Math.max(2,Math.round((w.count/mx)*18));
      return `<div class="obar${w.break?' brk':''}" style="height:${h}px;background:${rc(w.top_relator)};opacity:${w.break?1:.5}"></div>`;
    }).join('');
    return `<div class="art-item${actId===art.id?' active':''}" data-id="${esc(art.id)}" onclick="open_(this.dataset.id)">
      <div class="ai-row1">
        <span class="ai-num">${art.label}</span>
        <span class="ai-tier ${art.tier}">${TC[art.tier]}</span>
      </div>
      <div class="ai-label">${esc(art.full.substring(0,75))}${art.full.length>75?'…':''}</div>
      <div class="ai-row3">
        <div class="oscillo">${bars}</div>
        <span class="ai-score ${art.tier}">${art.score}</span>
      </div>
    </div>`;
  }).join('');
}

function scrollAct(){
  const el=document.querySelector('.art-item.active');
  if(el)el.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function open_(id){
  actId=id;rSide();scrollAct();
  const art=A.find(a=>a.id===id);
  if(art)rDetail(art);
}

function nav(dir){
  const d=gf();if(!d.length)return;
  const i=aidx();const nx=i<0?0:(i+dir+d.length)%d.length;
  open_(d[nx].id);
}

    const col=rc(w.top_relator);
    const isBreak=!!w.break;
    const isRev=isBreak&&art.reversals.some(rv=>rv.window_c===w.window||rv.window_b===w.window);
    const isFrag=art.frag_windows.some(fw=>fw.window===w.window);

    let brkConnector='';
    if(isBreak){
      const badgeCls=isRev?'rev':w.break==='relator_shift'?'rel':'cls';
      const badgeLabel=isRev?'⟲ reversão decisória':w.break==='relator_shift'?'↩ mudança de relator':'⇄ mudança de classe';
      brkConnector=`<div class="brk-connector">
        <div class="brk-line"></div>
        <div class="brk-badge ${badgeCls}">${badgeLabel}</div>
        <div class="brk-line"></div>
      </div>`;
    }

    let changePanel='';
    if(isBreak&&w.text){
      const prev=art.line.slice(0,i).reverse().find(pw=>pw.text);
      if(prev){
        changePanel=`<div class="change-panel">
          <div class="cp-row before">
            <div class="cp-label">📋 Entendimento anterior — ${esc(prev.window)}</div>
            <div class="cp-text">${esc(prev.text)}${prev.text.length>=200?'…':''}</div>
          </div>
          <div class="cp-divider">↓ virada — ${esc(w.window)}</div>
          <div class="cp-row after">
            <div class="cp-label">📌 Novo entendimento</div>
            <div class="cp-text new">${esc(w.text)}${w.text.length>=200?'…':''}</div>
          </div>
        </div>`;
      }
    }

    const docHTML=w.text?`<div class="pc-body">
      <div class="pc-body-yr">${w.text_year?w.text_year+' · ':''}${esc(w.text_relator||'—')}</div>
      <div class="pc-doctrine">${esc(w.text)}${w.text.length>=200?'…':''}</div>
      ${changePanel}
    </div>`:'';

    const flagsHTML=`<div class="pc-flags">
      ${isRev?'<span class="brk-badge rev" style="font-size:7px">⟲ reversão</span>':''}
      ${isFrag?'<span class="frag-warn">⚡ fragmentado</span>':''}
    </div>`;

    return `<div class="vtl-node">
      ${brkConnector}
      <div class="vtl-dot${isBreak?' is-brk':''}${isRev?' is-rev':''}" style="background:${col}"></div>
      <div class="period-card${isBreak?' is-brk':''}${isFrag?' is-frag':''}">
        <div class="pc-head">
          <div class="pc-period-col">
            <div class="pc-period">${w.window}</div>
            <div class="pc-count">${w.count}</div>
            <div class="pc-count-l">decisões</div>
          </div>
          <div class="pc-rel-col">
            <div class="pc-relator" style="color:${col}">${esc(w.top_relator||'—')}</div>
            <div class="pc-cls">${w.top_class||'—'}</div>
          </div>
          ${flagsHTML}
        </div>
        ${docHTML}
      </div>
    </div>`;
  }).join('');

  dp.innerHTML=`<div class="d-wrap">
    <div class="d-nav">
      <button class="nav-btn" onclick="nav(-1)"${i<=0?' disabled':''}>← anterior</button>
      <span class="nav-pos">${i+1} / ${d.length}</span>
      <button class="nav-btn" onclick="nav(1)"${i>=d.length-1?' disabled':''}>próximo →</button>
    </div>
    <div class="d-num">${art.label} · ${art.year_min}–${art.year_max}</div>
    <div class="d-title">${esc(art.full.substring(0,85))}${art.full.length>85?'…':''}</div>
    <div class="d-full">${esc(art.full)}</div>

    <div class="inst-dash">
      <div class="inst-score-block">
        <div class="inst-score-n ${art.tier}">${art.score}</div>
        <div class="inst-score-l">índice de instabilidade</div>
        <div class="inst-tier-badge ${art.tier}">${TL[art.tier]}</div>
      </div>
      <div class="inst-dims">${dimHTML}</div>
    </div>

    <div class="chart-row">
      <div class="cc"><div class="cc-t">Volume por período</div><div class="cw"><canvas id="cv"></canvas></div></div>
      <div class="cc"><div class="cc-t">Relatores</div><div class="cw"><canvas id="cr"></canvas></div></div>
    </div>

    ${alertsHTML?`<div class="alerts">${alertsHTML}</div>`:''}

    <div class="sec-t">Linha decisória — entendimento e oscilação por período</div>
    <div class="vtl">${vtlHTML}</div>
  </div>`;

  // Charts
  kc('cv');kc('cr');
  setTimeout(()=>{
    chts['cv']=new Chart(document.getElementById('cv'),{type:'bar',data:{labels:art.line.map(w=>w.window),datasets:[{data:art.line.map(w=>w.count),backgroundColor:art.line.map(w=>w.break?'#c0392b':rc(w.top_relator)),borderRadius:3,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y} dec · ${art.line[c.dataIndex].top_relator||'—'}`}}},scales:{x:{ticks:{font:{size:9},color:'#9b9186',maxRotation:30}},y:{grid:{color:'rgba(15,14,13,.06)'},ticks:{font:{size:9},color:'#9b9186'}}}}});
    const rm={};art.line.forEach(w=>{if(w.top_relator)rm[w.top_relator]=(rm[w.top_relator]||0)+w.count;});
    const re=Object.entries(rm).sort((a,b)=>b[1]-a[1]);
    chts['cr']=new Chart(document.getElementById('cr'),{type:'doughnut',data:{labels:re.map(e=>e[0]),datasets:[{data:re.map(e=>e[1]),backgroundColor:re.map(e=>rc(e[0])),borderWidth:2,borderColor:'#f5f0e8'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:9},color:'#6b6355',boxWidth:10}},tooltip:{callbacks:{label:c=>`${c.label}: ${c.parsed} (${(art.total?(c.parsed/art.total)*100:0).toFixed(1)}%)`}}}}});
  },80);
  dp.scrollTo({top:0,behavior:'smooth'});
}

function cls(){
  document.getElementById('si').value='';srch='';
  document.getElementById('sx').classList.remove('on');
  rSide();
}

document.getElementById('si').addEventListener('input',e=>{
  srch=e.target.value.trim();
  document.getElementById('sx').classList.toggle('on',srch.length>0);
  rSide();
  if(srch.length>1){const d=gf();if(d.length)open_(d[0].id);}
});

document.querySelectorAll('.sbt').forEach(b=>b.addEventListener('click',()=>{
  sort=b.dataset.sort;
  document.querySelectorAll('.sbt').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');rSide();
}));

document.addEventListener('keydown',ev=>{
  const t=document.activeElement.tagName;
  if(ev.key==='/'&&t!=='INPUT'){ev.preventDefault();document.getElementById('si').focus();}
  else if(ev.key==='Escape'){document.getElementById('si').blur();cls();}
  else if(ev.key==='ArrowDown'&&t!=='INPUT'){ev.preventDefault();nav(1);}
  else if(ev.key==='ArrowUp'&&t!=='INPUT'){ev.preventDefault();nav(-1);}
  else if(ev.key==='Enter'&&t==='INPUT'){document.getElementById('si').blur();const d=gf();if(d.length)open_(d[0].id);}
});

rSide();
if(A.length)open_(A[0].id);
</script>
</body>
</html>
